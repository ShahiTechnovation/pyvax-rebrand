name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Bandit (static analysis)
        run: |
          bandit -r avax_cli/ classified_agent/ -f json -o bandit-report.json --severity-level medium || true
          bandit -r avax_cli/ classified_agent/ --severity-level medium
        continue-on-error: false

      - name: Run Safety (dependency check)
        run: |
          safety check --output json > safety-report.json || true
          safety check
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  test-security:
    name: Security Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run security tests
        run: |
          pytest tests/test_keccak_collisions.py tests/test_transpiler_sandbox.py tests/test_wallet_security.py tests/test_agent_security.py -v --tb=short

      - name: Run full test suite
        run: |
          pytest tests/ classified_agent/tests/ -v --tb=short
