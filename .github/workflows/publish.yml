name: Publish Python Package to PyPI

on:
  release:
    types: [published]

jobs:
  pypi-publish:
    name: Build and publish Python package
    runs-on: ubuntu-latest
    
    # IMPORTANT: This permission is required for PyPI Trusted Publishing!
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip setuptools wheel build

      - name: Build package
        # Since setup.py and pyproject.toml are in the root directory
        run: python -m build
        
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password or API token needed here because Trusted Publisher handles authentication automatically!
