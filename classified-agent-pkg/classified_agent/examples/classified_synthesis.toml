# ── Project Classified: Synthesis + PyVax (Avalanche Only) ─────────
# Use this to run the agent in Synthesis hackathon mode with
# real PyVax compilation and deployment on Avalanche Fuji.

[agent]
name = "synthesis-agent"
description = "Synthesis hackathon agent — compiles and deploys PyVax contracts on Avalanche"
workspace_dir = "./workspace"
max_steps = 100

[llm]
provider = "anthropic"
model = "claude-sonnet-4-20250514"
api_key_env = "ANTHROPIC_API_KEY"

[wallet]
backend = "pyvax_local"
default_chain = "avalanche_fuji"
rpc_url = "https://api.avax-test.network/ext/bc/C/rpc"

[wallet.policy]
max_native_per_tx = "0.5"       # max 0.5 AVAX per deploy/tx
max_native_per_day = "2.0"      # daily cap
allowed_contracts = []          # no allowlist — trust the agent
allowed_methods = []

[synthesis]
enabled = true
skill_url = "https://synthesis.md/skill.md"
track = "open"
agent_profile = "DeFi contract builder on Avalanche using PyVax Python→EVM toolchain"

[logging]
level = "INFO"
log_dir = "./logs"
